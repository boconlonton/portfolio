name: Deploy to S3 and Invalidate CloudFront

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-s3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # Empty AWS_ROLE_ARN makes configure-aws-credentials fail with "Could not load credentials from any providers".
      - name: Check AWS_ROLE_ARN secret
        env:
          _ROLE: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -z "$_ROLE" ]; then
            echo "::error::Secret AWS_ROLE_ARN is missing or empty (repo or environment Actions secrets)."
            exit 1
          fi

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com
          role-session-name: minimal-portfolio-${{ github.run_id }}

      - name: Sync out/ to S3
        run: |
          aws sts get-caller-identity
          aws s3 sync out/ "s3://${{ secrets.AWS_S3_BUCKET }}/" --delete --no-progress

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --region us-east-1
