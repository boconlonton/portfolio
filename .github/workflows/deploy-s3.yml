name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-s3-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set build environment variables
        run: |
          append_env() {
            local name=$1
            local value=$2
            [ -z "$value" ] && return 0
            {
              printf '%s<<BUILD_ENV_EOF\n' "$name"
              printf '%s\n' "$value"
              printf 'BUILD_ENV_EOF\n'
            } >> "$GITHUB_ENV"
          }
          append_env NEXT_PUBLIC_BACKEND_URL "${NEXT_PUBLIC_BACKEND_URL}"
          append_env NEXT_PUBLIC_COGNITO_USER_POOL_ID "${NEXT_PUBLIC_COGNITO_USER_POOL_ID}"
          append_env NEXT_PUBLIC_COGNITO_CLIENT_ID "${NEXT_PUBLIC_COGNITO_CLIENT_ID}"
          append_env NEXT_PUBLIC_COGNITO_REGION "${NEXT_PUBLIC_COGNITO_REGION}"
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ vars.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_COGNITO_REGION: ${{ vars.NEXT_PUBLIC_COGNITO_REGION }}

      - name: Build
        run: pnpm build

      - name: Verify AWS_ROLE_ARN
        env:
          ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -z "$ROLE_ARN" ]; then
            echo "::error::Secret AWS_ROLE_ARN is missing or empty on environment production."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com
          role-session-name: gha-deploy-${{ github.run_id }}

      - name: Upload to S3
        run: >-
          aws s3 sync out/ "s3://${{ secrets.AWS_S3_BUCKET }}/"
          --delete --no-progress

      - name: Invalidate CloudFront
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
          --region ${{ env.AWS_REGION }}
