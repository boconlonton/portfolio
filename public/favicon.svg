<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#09090b"/>

  <!-- Sky dot (above the limit) -->
  <circle cx="16" cy="11" r="2.5" fill="#2563eb"/>

  <!-- Horizon line (the limit) -->
  <line x1="7" y1="19" x2="25" y2="19" stroke="#fafafa" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Ground (below the limit), subtle -->
  <line x1="9" y1="23" x2="23" y2="23" stroke="#3f3f46" stroke-width="1.5" stroke-linecap="round"/>
</svg>
